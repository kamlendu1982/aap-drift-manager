---
- name: Deploy Splunk using Podman (Built-in Modules Only)
  hosts: all
  become: true
  vars:
    splunk_password: "ansible123"

  tasks:
    - name: Check if Splunk container already exists
      ansible.builtin.shell: "podman ps -a --format '{% raw %}{{.Names}}{% endraw %}'"
      register: podman_containers
      changed_when: false

    - name: Run Splunk container
      ansible.builtin.shell: >
        podman run -d 
        --name splunk_instance
        --restart always
        -p 8088:8088 -p 8000:8000 
        -e SPLUNK_START_ARGS='--accept-license' 
        -e SPLUNK_PASSWORD='{{ splunk_password }}' 
        splunk/splunk:latest
      when: "'splunk_instance' not in podman_containers.stdout"