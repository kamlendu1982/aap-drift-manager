---
# =============================================================================
# AAP Drift Manager - Ansible Playbook
# =============================================================================
# Detects and reconciles configuration drift between a Git CaaC repo and a
# live Ansible Automation Platform instance.
#
# HOW SECRETS AND VARIABLES ARE PASSED
# =====================================
# Sensitive values (tokens, API keys) - set via AAP Custom Credential:
#   Create a Custom Credential Type with these injector env vars:
#     MAAS_API_KEY      - LLM / MaaS API key
#     AAP_API_TOKEN     - AAP controller API token
#
# Non-sensitive values - set as Job Template Extra Variables or Survey:
#     maas_api_base     - LLM endpoint URL
#     maas_model        - LLM model name
#     aap_mcp_server_url - AAP controller URL
#     aap_mcp_port      - AAP controller port (default: 443)
#     aap_verify_ssl    - Verify SSL certs (default: false)
#     git_repo_path     - CaaC git repo URL (SSH or HTTPS)
#     git_branch        - Branch to use (default: main)
#     no_delete_types   - Object types never deleted (default: credentials)
#     protected_objects - Individual object names never deleted (default: Default)
#
# Run mode - set as Extra Variables or Survey:
#     drift_apply       - true = apply changes; false = dry-run (default: false)
#     drift_objects     - comma-separated types to reconcile (default: all)
#
# The playbook writes a .env file in the project directory before invoking
# the Python agent, so the agent picks up all settings automatically.
# =============================================================================

- name: AAP Drift Manager - reconcile AAP with Config-as-Code in Git
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # -----------------------------------------------------------------
    # Python interpreter
    # In the EE, python3.12 is installed system-wide - no venv needed.
    # When running locally with a venv, override this:
    #   ansible-playbook ... -e drift_python=/path/to/venv/bin/python3.12
    # -----------------------------------------------------------------
    drift_python: "python3.12"
    drift_script: "{{ playbook_dir }}/run_drift.py"

    # -----------------------------------------------------------------
    # Run mode
    # -----------------------------------------------------------------
    drift_apply: false      # true = apply changes; false = dry-run (safe default)
    drift_objects: ""       # empty = all managed types; or "organizations,projects"

    # -----------------------------------------------------------------
    # Log file
    # -----------------------------------------------------------------
    drift_log_file: "/tmp/aap-drift-{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}.log"

    # -----------------------------------------------------------------
    # Non-sensitive settings (set as Extra Variables or Survey in AAP)
    # -----------------------------------------------------------------
    maas_api_base: ""
    maas_model: ""
    aap_mcp_server_url: ""
    aap_mcp_port: "443"
    aap_verify_ssl: "false"
    git_repo_path: ""
    git_branch: "main"
    no_delete_types: "credentials"
    protected_objects: "Default"
    log_level: "INFO"

    # -----------------------------------------------------------------
    # Sensitive settings - injected by AAP Custom Credential as env vars:
    #   MAAS_API_KEY       (MaaS / LLM API key)
    #   AAP_API_TOKEN      (AAP controller token)
    # The lookup('env', ...) calls below read them from the environment
    # without ever exposing them in logs or Ansible facts.
    # -----------------------------------------------------------------

  pre_tasks:
    # -----------------------------------------------------------------
    # 1. Write .env from AAP credentials + extra vars (AAP runs only)
    #
    #    This task runs ONLY when MAAS_API_KEY is injected as an env var
    #    by an AAP Custom Credential.  When running locally the task is
    #    skipped and the existing .env file in the project directory is
    #    used as-is (so local runs keep working without changes).
    # -----------------------------------------------------------------
    - name: Write .env from AAP credentials and extra variables (AAP runs)
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/.env"
        mode: "0600"
        content: |
          # Auto-generated by aap-drift-manager.yaml - do not edit manually.
          # Regenerated on every AAP job run from credentials and extra vars.

          # LLM / MaaS Configuration
          MAAS_API_KEY={{ lookup('env', 'MAAS_API_KEY') }}
          MAAS_API_BASE={{ maas_api_base }}
          MAAS_MODEL={{ maas_model }}

          # AAP Controller
          AAP_API_TOKEN={{ lookup('env', 'AAP_API_TOKEN') }}
          AAP_MCP_SERVER_URL={{ aap_mcp_server_url }}
          AAP_MCP_PORT={{ aap_mcp_port }}
          AAP_VERIFY_SSL={{ aap_verify_ssl }}

          # Git CaaC Repository
          GIT_REPO_PATH={{ git_repo_path }}
          GIT_BRANCH={{ git_branch }}

          # Agent Behaviour
          DRY_RUN={{ 'false' if drift_apply | bool else 'true' }}
          LOG_LEVEL={{ log_level }}

          # Guardrails (code-enforced - not LLM text instructions)
          NO_DELETE_TYPES={{ no_delete_types }}
          PROTECTED_OBJECTS={{ protected_objects }}

          # CrewAI internal storage - /tmp is always writable inside the EE
          CREWAI_STORAGE_DIR=/tmp/crewai-drift-storage
      # Only write .env when secrets are injected by AAP credential.
      # When running locally the existing .env file is used unchanged.
      when: lookup('env', 'MAAS_API_KEY') | length > 0

    # -----------------------------------------------------------------
    # 2. Confirm .env exists (generated above OR pre-existing for local runs)
    # -----------------------------------------------------------------
    - name: Check .env file exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/.env"
      register: _env_stat

    - name: Abort - .env file missing and no AAP credential injection
      ansible.builtin.fail:
        msg: |
          No .env file found at {{ playbook_dir }}/.env
          and MAAS_API_KEY was not injected by an AAP credential.

          For LOCAL runs:
            Make sure a .env file exists in the project directory.
            Copy the example: cp .env.example .env  then fill in values.

          For AAP runs:
            Attach a credential of type 'aap_drift_manager_secrets' to
            this Job Template so MAAS_API_KEY and AAP_API_TOKEN are
            injected automatically.
      when: not _env_stat.stat.exists

    # -----------------------------------------------------------------
    # 3. Verify run_drift.py was checked out from Git
    # -----------------------------------------------------------------
    - name: Check run_drift.py is present (Git checkout succeeded)
      ansible.builtin.stat:
        path: "{{ drift_script }}"
      register: _script_stat

    - name: Abort - run_drift.py not found
      ansible.builtin.fail:
        msg: >-
          run_drift.py not found at: {{ drift_script }}.
          Make sure the Job Template's Project points at the aap-drift-manager
          Git repository and the project sync has completed.
      when: not _script_stat.stat.exists

    # -----------------------------------------------------------------
    # 4. Verify Python 3.12 is available
    # -----------------------------------------------------------------
    - name: Confirm python3.12 is available in the EE
      ansible.builtin.command:
        cmd: "{{ drift_python }} --version"
      register: _py_ver
      changed_when: false
      failed_when: _py_ver.rc != 0

    - name: Show Python version
      ansible.builtin.debug:
        msg: "Using {{ _py_ver.stdout }}"

  # -----------------------------------------------------------------------
  # Main tasks
  # -----------------------------------------------------------------------
  tasks:
    - name: Display run configuration
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - " AAP Drift Manager"
          - "============================================================"
          - "  Python  : {{ drift_python }}"
          - "  Script  : {{ drift_script }}"
          - "  Mode    : {{ 'APPLY CHANGES' if drift_apply | bool else 'DRY-RUN (no changes)' }}"
          - "  Objects : {{ drift_objects if drift_objects else 'from .env (managed_objects)' }}"
          - "  Log     : {{ drift_log_file }}"
          - "============================================================"

    - name: Build command arguments
      ansible.builtin.set_fact:
        _drift_args: >-
          {{ '--apply' if drift_apply | bool else '' }}
          {{ ('--objects ' + drift_objects) if drift_objects else '' }}

    - name: Run AAP drift reconciliation agent
      ansible.builtin.command:
        cmd: "{{ drift_python }} {{ drift_script }} {{ _drift_args | trim }}"
        chdir: "{{ playbook_dir }}"
      environment:
        PYTHONPATH: "{{ playbook_dir }}"
        PYTHONUNBUFFERED: "1"
      register: _drift_result
      ignore_errors: true

    - name: Save full output to log file
      ansible.builtin.copy:
        content: |
          ============================================================
          AAP Drift Manager - Run Log
          ============================================================
          Timestamp  : {{ lookup('pipe', 'date --iso-8601=seconds') }}
          Project    : {{ playbook_dir }}
          Mode       : {{ 'APPLY' if drift_apply | bool else 'DRY-RUN' }}
          Objects    : {{ drift_objects if drift_objects else 'all' }}
          Exit code  : {{ _drift_result.rc }}

          --- STDOUT -------------------------------------------------
          {{ _drift_result.stdout | default('(no output)') }}

          --- STDERR -------------------------------------------------
          {{ _drift_result.stderr | default('(no errors)') }}
        dest: "{{ drift_log_file }}"
        mode: "0644"

    - name: Show reconciliation output
      ansible.builtin.debug:
        msg: "{{ _drift_result.stdout_lines }}"
      when:
        - _drift_result.stdout_lines is defined
        - _drift_result.stdout_lines | length > 0

    - name: Show errors from stderr (if any)
      ansible.builtin.debug:
        msg: "{{ _drift_result.stderr_lines }}"
      when:
        - _drift_result.stderr_lines is defined
        - _drift_result.stderr_lines | length > 0

    - name: Log file location
      ansible.builtin.debug:
        msg: "Full output saved to: {{ drift_log_file }}"

    - name: Fail playbook if drift manager reported an error
      ansible.builtin.fail:
        msg: >-
          AAP Drift Manager exited with code {{ _drift_result.rc }}.
          Check the log for details: {{ drift_log_file }}
      when: _drift_result.rc != 0
